<style>
body {margin:0;font-family:Arial;background:#f4f4f4;}
header {display:flex; flex-wrap:wrap; padding:15px; background:#111; color:white;}
.sidebar {width:180px; display:flex; flex-direction:column; gap:10px;}
.category-pill {background:#333;color:white;padding:8px 12px;border-radius:5px;cursor:pointer;user-select:none;}
.category-pill:hover {background:#0071e3;}
.main-header {flex:1; display:flex; flex-direction:column; gap:10px; margin-left:20px;}
.search-box {display:flex; gap:5px;}
.search-box input {padding:8px;width:250px;border-radius:5px;border:1px solid #ccc;}
.search-box button {padding:8px 12px;border:none;border-radius:5px;background:#0071e3;color:white;cursor:pointer;}
.search-box button:hover {background:#005bb5;}
.products {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;}
.card {background:white;padding:15px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center;}
.card img {width:100%;height:200px;object-fit:contain;}
button.add {background:#0071e3;color:white;padding:10px;border:none;border-radius:5px;cursor:pointer;margin-top:10px;}
button.add:hover {background:#005bb5;}
.cart {position:fixed;right:-400px;top:0;width:320px;height:100%;background:white;box-shadow:-5px 0 15px rgba(0,0,0,0.2);padding:20px;transition:0.4s;overflow:auto;}
.cart.active {right:0;}
.close-cart {font-size:22px;cursor:pointer;float:right;}
.cart h2 {margin-top:0;}
.cart-btn {cursor:pointer; margin-left:auto;}
</style>
</head>
<body>

<header>
<div class="sidebar">
<div class="category-pill" onclick="filterCategory('all')">Hamısı</div>
<div class="category-pill" onclick="filterCategory('Apple')">Apple</div>
<div class="category-pill" onclick="filterCategory('Samsung')">Samsung</div>
<div class="category-pill" onclick="filterCategory('Xiaomi')">Xiaomi</div>
<div class="category-pill" onclick="filterCategory('Honor')">Honor</div>
</div>

<div class="main-header">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Telefon axtar...">
<button onclick="searchProductButton()">Axtar</button>
</div>
<div class="cart-btn" onclick="openCart()">🛒 Səbət (<span id="cart-count">0</span>)</div>
</div>
</header>

<section class="products" id="products"></section>

<div class="cart" id="cart">
<span class="close-cart" onclick="openCart()">✖</span>
<h2>Səbət</h2>
<div id="cart-items"></div>
<br>
<input type="text" id="customerName" placeholder="Adınız" style="width:100%;padding:8px;"><br><br>
<input type="text" id="customerPhone" placeholder="Telefon nömrəniz" style="width:100%;padding:8px;"><br><br>
<button class="add" onclick="checkout()">Sifariş et</button>

let cart=[];
let currentCategory="all";

function displayProducts(){
let container=document.getElementById("products");
container.innerHTML="";
products
.filter(p=> currentCategory==="all" || p.category===currentCategory)
.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" alt="${p.name}">
<h3>${p.name}</h3>
<p><b>${p.price} AZN</b></p>
<button class="add" onclick="addToCart(${i})">Səbətə əlavə et</button>
</div>`;
});
}

function filterCategory(cat){
currentCategory=cat;
displayProducts();
}

function searchProduct(text){
text=text.toLowerCase();
let container=document.getElementById("products");
container.innerHTML="";
products
.filter(p=>p.name.toLowerCase().includes(text))
.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p><b>${p.price} AZN</b></p>
<button class="add" onclick="addToCart(${i})">Səbətə əlavə et</button>
</div>`;});
}

function searchProductButton(){
let text=document.getElementById("searchInput").value;
searchProduct(text);
}

function addToCart(index){
cart.push(products[index]);
document.getElementById("cart-count").innerText=cart.length;
}

function openCart(){
document.getElementById("cart").classList.toggle("active");
displayCart();
}

function displayCart(){
let items=document.getElementById("cart-items");
items.innerHTML="";
cart.forEach(item=>{
items.innerHTML+=`<p>${item.name} - ${item.price} AZN</p>`;
});
}

function checkout(){
alert("Sifariş göndərildi!");
cart=[];
document.getElementById("cart-count").innerText=0;
document.getElementById("cart-items").innerHTML="";
}

displayProducts();

</script>
